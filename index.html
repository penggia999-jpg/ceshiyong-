<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>班主任智能排座 · 花一</title>
    <style>
        * { box-sizing: border-box; font-family: '微软雅黑', sans-serif; }
        body { background: #f0f4fa; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { max-width: 1200px; width: 100%; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px; color: #1e3a6b; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        h1 small { background: #e6edf8; color: #1e3c5a; padding: 4px 14px; border-radius: 40px; font-size: 14px; }
        .sub { border-left: 4px solid #3b7cbf; padding-left: 16px; margin-bottom: 20px; }
        
        .panel { background: #f8fbfe; border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; border: 1px solid #d9e5f0; }
        .mode-group { display: flex; align-items: center; gap: 15px; }
        .mode-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .param-item { display: flex; align-items: center; gap: 8px; }
        .param-item input { width: 70px; padding: 6px; border: 1px solid #bccfeb; border-radius: 8px; }
        .btn { background: white; border: 1px solid #b7cbe5; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .btn-primary { background: #1e3a6b; color: white; border: none; }
        .btn-success { background: #2d6a4f; color: white; border: none; }
        
        .import-area { margin-bottom: 20px; }
        .import-area textarea { width: 100%; padding: 10px; border: 1px solid #bed5f0; border-radius: 8px; }
        
        .seat-grid { background: #f2f2f6; border-radius: 16px; padding: 20px; overflow-x: auto; }
        .pulpit { text-align: center; background: #b8cde0; padding: 10px; border-radius: 30px; margin-bottom: 10px; font-weight: bold; }
        
        /* 讲台两侧座位 - 紧贴讲台下方 */
        .side-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 25px;
            margin-top: 5px;
        }
        .side-seat {
            width: 100px;
            text-align: center;
        }
        .side-label {
            font-size: 12px;
            color: #1d3d63;
            margin-bottom: 4px;
        }
        .side-box {
            background: #fef3d6;
            border: 2px solid #e3b35c;
            border-radius: 10px;
            padding: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .side-box.selected {
            border: 4px solid #f3aa3a;
            background: #fffae6;
        }
        
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .seat { width: 80px; height: 80px; background: white; border: 2px solid #9aaec9; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; text-align: center; cursor: pointer; }
        .seat.empty { background: #e2e8f2; color: #7d93b0; }
        .seat.selected { border: 4px solid #f3aa3a; background: #fffae6; }
        .export-bar { margin: 20px 0; display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧑‍🏫 班主任智能排座 <small>花一</small></h1>
    <div class="sub">📋 贴入花名册 → 设置参数 → 排座 → 导出Excel</div>

    <!-- 导入区 -->
    <div class="import-area">
        <textarea id="studentNames" rows="3" placeholder="一行一个学生姓名&#10;王小明&#10;李小丽&#10;张子轩&#10;刘雨桐">王小明
李小丽
张子轩
刘雨桐
赵子龙
孙尚香
周小鱼
郑子涵
陈小星
林小月
吴小宇
黄小贝
徐小帆
胡小蝶
郭小阳
马小云</textarea>
    </div>

    <!-- 设置区 -->
    <div class="panel">
        <div class="mode-group">
            <label><input type="radio" name="mode" value="double" checked> 双人同桌</label>
            <label><input type="radio" name="mode" value="single"> 单人单桌</label>
        </div>
        <div class="param-item" id="groupParam">
            <label>大组数 (2-6):</label>
            <input type="number" id="groupCount" min="2" max="6" value="4">
        </div>
        <div class="param-item" id="colParam" style="display:none;">
            <label>列数 (2-10):</label>
            <input type="number" id="colCount" min="2" max="10" value="7">
        </div>
        <div class="param-item">
            <label><input type="checkbox" id="usePulpit" checked> 讲台两侧加座</label>
        </div>
        <button class="btn btn-primary" id="arrangeBtn">✨ 智能排座</button>
    </div>

    <!-- 导出按钮（只保留Excel） -->
    <div class="export-bar">
        <button class="btn btn-success" id="exportExcelBtn">📊 导出Excel</button>
    </div>

    <!-- 座位表 -->
    <div class="seat-grid" id="seatGrid">
        <div class="pulpit">🏫 讲 台 🏫</div>
        
        <!-- 讲台两侧座位 - 紧贴讲台下方 -->
        <div class="side-row" id="sideRow">
            <div class="side-seat">
                <div class="side-label">👈 讲台左侧</div>
                <div class="side-box" id="leftSeat">空</div>
            </div>
            <div class="side-seat">
                <div class="side-label">👉 讲台右侧</div>
                <div class="side-box" id="rightSeat">空</div>
            </div>
        </div>

        <!-- 主座位网格 -->
        <div id="mainGrid"></div>
    </div>
</div>

<script>
    let students = [];
    let seats = [];
    let leftStudent = null, rightStudent = null;
    let selectedRow = null, selectedCol = null, selectedSide = null;

    // 获取当前参数
    function getParams() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const groupNum = parseInt(document.getElementById('groupCount').value) || 4;
        const singleCols = parseInt(document.getElementById('colCount').value) || 7;
        const usePulpit = document.getElementById('usePulpit').checked;
        const cols = mode === 'double' ? groupNum * 2 : singleCols;
        return { mode, groupNum, singleCols, usePulpit, cols };
    }

    // 切换参数显示
    document.querySelectorAll('input[name="mode"]').forEach(r => {
        r.addEventListener('change', function() {
            document.getElementById('groupParam').style.display = this.value === 'double' ? 'flex' : 'none';
            document.getElementById('colParam').style.display = this.value === 'single' ? 'flex' : 'none';
        });
    });

    // 导入名单
    document.getElementById('studentNames').addEventListener('input', function() {
        students = this.value.split('\n').map(s => s.trim()).filter(s => s);
    });

    // 智能排座
    document.getElementById('arrangeBtn').addEventListener('click', function() {
        const text = document.getElementById('studentNames').value;
        students = text.split('\n').map(s => s.trim()).filter(s => s);
        if (!students.length) return alert('请先输入学生姓名');
        
        const { cols, usePulpit } = getParams();
        let list = [...students];
        
        // 随机打乱
        for (let i = list.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [list[i], list[j]] = [list[j], list[i]];
        }
        
        leftStudent = null;
        rightStudent = null;
        
        // 计算行数
        let rows = Math.ceil(list.length / cols);
        seats = Array(rows).fill().map(() => Array(cols).fill(null));
        
        let idx = 0;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (idx < list.length) {
                    seats[r][c] = list[idx++];
                }
            }
        }
        
        // 如果启用讲台两侧，把最后两个人移过去
        if (usePulpit && list.length > rows * cols) {
            let extra = list.slice(rows * cols);
            if (extra.length > 0) leftStudent = extra[0];
            if (extra.length > 1) rightStudent = extra[1];
        }
        
        selectedRow = selectedCol = null;
        selectedSide = null;
        render();
    });

    // 渲染座位
    function render() {
        const { cols } = getParams();
        const mainDiv = document.getElementById('mainGrid');
        let html = '';
        
        for (let r = 0; r < seats.length; r++) {
            html += '<div class="row">';
            for (let c = 0; c < cols; c++) {
                const name = seats[r]?.[c] || null;
                const selected = (selectedRow === r && selectedCol === c);
                html += `<div class="seat ${!name ? 'empty' : ''} ${selected ? 'selected' : ''}" data-row="${r}" data-col="${c}">${name || '空'}</div>`;
            }
            html += '</div>';
        }
        mainDiv.innerHTML = html || '<div style="text-align:center;padding:30px;">点击【智能排座】生成座位</div>';
        
        // 更新两侧座位显示
        const leftBox = document.getElementById('leftSeat');
        const rightBox = document.getElementById('rightSeat');
        leftBox.innerText = leftStudent || '空';
        rightBox.innerText = rightStudent || '空';
        
        // 选中状态
        leftBox.className = `side-box ${selectedSide === 'left' ? 'selected' : ''}`;
        rightBox.className = `side-box ${selectedSide === 'right' ? 'selected' : ''}`;
        
        // 绑定主座位点击事件
        document.querySelectorAll('.seat[data-row]').forEach(seat => {
            seat.addEventListener('click', function() {
                const row = parseInt(this.dataset.row);
                const col = parseInt(this.dataset.col);
                
                if (selectedRow !== null && selectedCol !== null) {
                    // 交换两个主座位
                    const a = seats[selectedRow][selectedCol];
                    const b = seats[row][col];
                    seats[selectedRow][selectedCol] = b;
                    seats[row][col] = a;
                    selectedRow = selectedCol = null;
                    selectedSide = null;
                } else if (selectedSide === 'left') {
                    // 与左侧交换
                    const tmp = leftStudent;
                    leftStudent = seats[row][col];
                    seats[row][col] = tmp;
                    selectedSide = null;
                } else if (selectedSide === 'right') {
                    // 与右侧交换
                    const tmp = rightStudent;
                    rightStudent = seats[row][col];
                    seats[row][col] = tmp;
                    selectedSide = null;
                } else {
                    selectedRow = row;
                    selectedCol = col;
                    selectedSide = null;
                }
                render();
            });
        });
        
        // 绑定左侧座位点击
        leftBox.onclick = () => {
            if (selectedRow !== null && selectedCol !== null) {
                // 与选中的主座位交换
                const tmp = leftStudent;
                leftStudent = seats[selectedRow][selectedCol];
                seats[selectedRow][selectedCol] = tmp;
                selectedRow = selectedCol = null;
                selectedSide = null;
            } else {
                // 选中左侧
                selectedSide = selectedSide === 'left' ? null : 'left';
                selectedRow = selectedCol = null;
            }
            render();
        };
        
        // 绑定右侧座位点击
        rightBox.onclick = () => {
            if (selectedRow !== null && selectedCol !== null) {
                const tmp = rightStudent;
                rightStudent = seats[selectedRow][selectedCol];
                seats[selectedRow][selectedCol] = tmp;
                selectedRow = selectedCol = null;
                selectedSide = null;
            } else {
                selectedSide = selectedSide === 'right' ? null : 'right';
                selectedRow = selectedCol = null;
            }
            render();
        };
    }

    // 导出Excel（只保留这个）
    document.getElementById('exportExcelBtn').addEventListener('click', function() {
        const { cols } = getParams();
        
        // 构建CSV
        let csv = '讲台左侧,讲台右侧\n';
        csv += `${leftStudent || '空'},${rightStudent || '空'}\n\n`;
        
        // 添加主网格表头
        let headerRow = [];
        for (let c = 0; c < cols; c++) {
            headerRow.push(`第${c+1}列`);
        }
        csv += headerRow.join(',') + '\n';
        
        // 添加座位数据
        for (let r = 0; r < seats.length; r++) {
            let row = [];
            for (let c = 0; c < cols; c++) {
                row.push(seats[r]?.[c] || '空');
            }
            csv += row.join(',') + '\n';
        }
        
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '座位表_花一.csv';
        a.click();
        URL.revokeObjectURL(url);
    });

    // 初始化
    (function init() {
        const text = document.getElementById('studentNames').value;
        students = text.split('\n').map(s => s.trim()).filter(s => s);
        document.getElementById('arrangeBtn').click();
    })();
</script>
</body>
</html>
